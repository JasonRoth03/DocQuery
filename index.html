<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DocQuery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.6rem; margin-bottom: 2rem; letter-spacing: -0.5px; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%;
      max-width: 680px;
      margin-bottom: 1.5rem;
    }

    h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 1rem; }

    .upload-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="file"] {
      flex: 1;
      font-size: 0.9rem;
      color: #444;
    }

    button {
      background: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1.1rem;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: #444; }
    button:disabled { background: #bbb; cursor: default; }

    .status {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #555;
      min-height: 1.2em;
    }

    .status.error { color: #c0392b; }
    .status.success { color: #27ae60; }

    #doc-list { list-style: none; }
    #doc-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.9rem;
    }
    #doc-list li:last-child { border-bottom: none; }
    #doc-list .doc-meta { color: #888; font-size: 0.8rem; margin-left: 0.5rem; }
    #doc-list .del-btn {
      background: none;
      color: #c0392b;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 0 0.25rem;
    }
    #doc-list .del-btn:hover { background: none; color: #922b21; }

    .empty { color: #aaa; font-size: 0.9rem; font-style: italic; }

    .ask-row {
      display: flex;
      gap: 0.75rem;
    }

    #question {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      font-size: 0.95rem;
      outline: none;
    }

    #question:focus { border-color: #888; }

    .answer-box {
      margin-top: 1rem;
      background: #f9f9f9;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .sources { margin-top: 1rem; }
    .sources h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 0.5rem; }
    .source-item {
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.5rem;
      font-size: 0.84rem;
    }
    .source-item .source-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    .source-item .score { color: #888; font-weight: normal; }
    .source-item .excerpt { color: #555; line-height: 1.5; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>DocQuery</h1>

<!-- Upload -->
<div class="card">
  <h2>Upload Document</h2>
  <div class="upload-row">
    <input type="file" id="file-input" accept=".pdf,.txt,.md,.docx" />
    <button id="upload-btn" onclick="uploadDoc()">Upload</button>
  </div>
  <div class="status" id="upload-status"></div>
</div>

<!-- Document list -->
<div class="card">
  <h2>Documents</h2>
  <ul id="doc-list"><li class="empty">No documents yet.</li></ul>
</div>

<!-- Ask -->
<div class="card">
  <h2>Ask a Question</h2>
  <div class="ask-row">
    <input type="text" id="question" placeholder="What does the document say about…" onkeydown="if(event.key==='Enter') askQuestion()" />
    <button id="ask-btn" onclick="askQuestion()">Ask</button>
  </div>
  <div class="status" id="ask-status"></div>
  <div id="answer-area" style="display:none">
    <div class="answer-box" id="answer-text"></div>
    <div class="sources" id="sources-area"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

// ── document registry (client-side only; refresh page to re-sync) ──────────
const docs = [];

function renderDocs() {
  const ul = document.getElementById('doc-list');
  if (docs.length === 0) {
    ul.innerHTML = '<li class="empty">No documents yet.</li>';
    return;
  }
  ul.innerHTML = docs.map((d, i) => `
    <li>
      <span>
        <strong>${esc(d.filename)}</strong>
        <span class="doc-meta">${d.chunk_count} chunks · ${fmt(d.size_bytes)}</span>
      </span>
      <button class="del-btn" title="Delete" onclick="deleteDoc(${i}, '${d.id}')">✕</button>
    </li>
  `).join('');
}

// ── upload ─────────────────────────────────────────────────────────────────
async function uploadDoc() {
  const input = document.getElementById('file-input');
  const status = document.getElementById('upload-status');
  const btn = document.getElementById('upload-btn');

  if (!input.files.length) { setStatus(status, 'Pick a file first.', 'error'); return; }

  const formData = new FormData();
  formData.append('file', input.files[0]);

  btn.disabled = true;
  setStatus(status, '<span class="spinner"></span>Uploading…');

  try {
    const res = await fetch(`${API}/documents/upload`, { method: 'POST', body: formData });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    docs.push(data);
    renderDocs();
    input.value = '';
    setStatus(status, `✓ "${data.filename}" uploaded (${data.chunk_count} chunks)`, 'success');
  } catch (e) {
    setStatus(status, `Error: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── delete ─────────────────────────────────────────────────────────────────
async function deleteDoc(idx, id) {
  if (!confirm('Delete this document?')) return;
  try {
    const res = await fetch(`${API}/documents/${id}`, { method: 'DELETE' });
    if (!res.ok && res.status !== 204) throw new Error(await res.text());
    docs.splice(idx, 1);
    renderDocs();
  } catch (e) {
    alert(`Delete failed: ${e.message}`);
  }
}

// ── query ──────────────────────────────────────────────────────────────────
async function askQuestion() {
  const q = document.getElementById('question').value.trim();
  const status = document.getElementById('ask-status');
  const btn = document.getElementById('ask-btn');
  const area = document.getElementById('answer-area');

  if (!q) { setStatus(status, 'Enter a question first.', 'error'); return; }

  btn.disabled = true;
  area.style.display = 'none';
  setStatus(status, '<span class="spinner"></span>Thinking…');

  try {
    const res = await fetch(`${API}/query/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    document.getElementById('answer-text').textContent = data.answer;

    const srcEl = document.getElementById('sources-area');
    if (data.chunks && data.chunks.length) {
      srcEl.innerHTML = `<h3>Sources</h3>` + data.chunks.map(c => `
        <div class="source-item">
          <div class="source-header">
            <span>[${data.sources.find(s=>s.chunk_id===c.chunk_id)?.index ?? '?'}] ${esc(c.filename)}, chunk ${c.chunk_index}</span>
            <span class="score">${(c.score * 100).toFixed(1)}%</span>
          </div>
          <div class="excerpt">${esc(c.content.slice(0, 300))}${c.content.length > 300 ? '…' : ''}</div>
        </div>
      `).join('');
    } else {
      srcEl.innerHTML = '';
    }

    area.style.display = 'block';
    setStatus(status, '');
  } catch (e) {
    setStatus(status, `Error: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── helpers ────────────────────────────────────────────────────────────────
function setStatus(el, html, cls = '') {
  el.innerHTML = html;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}
</script>
</body>
</html>
